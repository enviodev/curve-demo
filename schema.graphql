type GlobalState {
  id: ID!
  chainId: Int!
  totalPools: Int!
  totalSwaps: BigInt!
  totalVolumeUsd: BigDecimal!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

enum PoolType {
  TRICRYPTO_NG
  TWOCRYPTO_NG
  CRYPTO_V1
  TRICRYPTO_LEGACY
  TWOCRYPTO_STANDALONE
  STABLESWAP_NG
  STABLESWAP_NG_META
  STABLESWAP
}

enum PriceSource {
  STABLECOIN
  DERIVED
}

enum PriceType {
  TOKEN_EXCHANGE
  LAST_PRICES
}

type Registry {
  id: ID!
  chainId: Int!
  address: String!
  registryType: String!
}

type Token {
  id: ID!
  chainId: Int!
  address: String!
  symbol: String!
  decimals: Int!
  isStablecoin: Boolean!
  usdPrice: BigDecimal
  priceSource: PriceSource
  lastPricedBlock: Int
  lastPricedTimestamp: BigInt
}

type Pool {
  id: ID!
  chainId: Int!
  address: String!
  lpTokenAddress: String!
  symbol: String!
  name: String!
  poolType: PoolType!
  registry: Registry
  nCoins: Int!
  coinAddresses: [String!]!
  coinSymbols: [String!]!
  coinDecimals: [Int!]!
  lastPrices: [BigInt!]!
  priceScales: [BigInt!]!
  # Stableswap fields — null for crypto pools
  a: BigInt
  virtualPrice: BigInt
  isMetaPool: Boolean
  basePool: String
  balances: [BigInt!]!
  totalSwapCount: BigInt!
  totalVolumeUsd: BigDecimal!
  tvlUsd: BigDecimal
  hasDonations: Boolean!
  isActive: Boolean!
  deploymentBlock: Int!
  deploymentTimestamp: BigInt!
  deploymentTxHash: String!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  liquidityEvents: [LiquidityEvent!]! @derivedFrom(field: "pool")
  poolPairs: [PoolPair!]! @derivedFrom(field: "pool")
  poolPrices: [PoolPrice!]! @derivedFrom(field: "pool")
  swaps: [Swap!]! @derivedFrom(field: "pool")
  snapshots: [PoolSnapshot!]! @derivedFrom(field: "pool")
}

# General per-swap record. Used by all pool classes (stableswap today; crypto
# pools also write the richer PoolPrice entity for oracle-based pricing).
type Swap {
  id: ID!
  chainId: Int!
  pool: Pool! @index
  buyer: String! @index
  soldId: Int!
  boughtId: Int!
  tokensSold: BigInt!
  tokensBought: BigInt!
  tokensSoldDecimal: BigDecimal!
  tokensBoughtDecimal: BigDecimal!
  volumeUsd: BigDecimal
  blockNumber: Int! @index
  timestamp: BigInt! @index
  txHash: String!
  logIndex: Int!
}

# Daily per-pool time-series, upserted on each swap/liquidity event.
# id = chainId_poolAddress_day (day = unix timestamp / 86400).
type PoolSnapshot {
  id: ID!
  chainId: Int!
  pool: Pool! @index
  day: Int! @index
  timestamp: BigInt!
  blockNumber: Int!
  tvlUsd: BigDecimal
  virtualPrice: BigInt
  balances: [BigInt!]!
  volumeUsd: BigDecimal!
  swapCount: Int!
}

type PoolPair {
  id: ID!
  pool: Pool! @index
  mainTokenIndex: Int!
  referenceTokenIndex: Int!
  mainToken: Token!
  referenceToken: Token!
}

type PoolPrice {
  id: ID!
  chainId: Int!
  pool: Pool! @index
  poolPair: PoolPair! @index
  priceType: PriceType!
  soldId: Int!
  boughtId: Int!
  tokensSold: BigDecimal!
  tokensBought: BigDecimal!
  price: BigDecimal!
  blockNumber: Int! @index
  timestamp: BigInt! @index
  txHash: String!
  logIndex: Int
  isRelevant: Boolean!
  buyer: String! @index
  fee: BigDecimal
  usdMainPrice: BigDecimal
  usdMainVolume: BigDecimal
  usdReferencePrice: BigDecimal
  usdReferenceVolume: BigDecimal
  usdFee: BigDecimal
}

enum LiquidityEventKind {
  ADD
  REMOVE
  REMOVE_ONE
  REMOVE_IMBALANCE
  DONATION
}

type LiquidityEvent {
  id: ID!
  pool: Pool! @index
  kind: LiquidityEventKind!
  provider: String! @index
  tokenAmounts: [BigInt!]!
  lpSupply: BigInt
  lpBurned: BigInt
  coinIndex: Int
  fee: BigInt
  timestamp: BigInt! @index
  blockNumber: Int!
  txHash: String!
}

# =========================================================================
# crvUSD mint markets + Curve Lend — shared Controller + LLAMMA design.
# A "Market" is one borrowable market; "Loan" is a single user's position
# (collateral, debt, soft-liquidation band range n1..n2). This is the
# per-user health/position data Curve's own public API does not expose.
# =========================================================================

enum MarketType {
  CRVUSD_MINT
  LEND
}

type Market {
  id: ID!
  chainId: Int!
  marketType: MarketType!
  controller: String! @index
  amm: String! @index
  vault: String
  collateralToken: Token!
  borrowedToken: Token!
  monetaryPolicy: String!
  priceOracle: String!
  totalDebt: BigInt!
  totalCollateral: BigInt!
  totalDebtUsd: BigDecimal
  totalCollateralUsd: BigDecimal
  nLoans: Int!
  rate: BigInt
  createdBlock: Int!
  createdTimestamp: BigInt!
  createdTxHash: String!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  loans: [Loan!]! @derivedFrom(field: "market")
  loanEvents: [LoanEvent!]! @derivedFrom(field: "market")
  liquidations: [Liquidation!]! @derivedFrom(field: "market")
}

type Loan {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  collateral: BigInt!
  debt: BigInt!
  collateralUsd: BigDecimal
  debtUsd: BigDecimal
  n1: BigInt!
  n2: BigInt!
  liquidationDiscount: BigInt!
  isActive: Boolean!
  createdBlock: Int!
  createdTimestamp: BigInt!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

enum LoanEventKind {
  BORROW
  REPAY
  REMOVE_COLLATERAL
  LIQUIDATE
}

type LoanEvent {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  kind: LoanEventKind!
  collateralChange: BigInt!
  debtChange: BigInt!
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}

type Liquidation {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  liquidator: String! @index
  collateralReceived: BigInt!
  stablecoinReceived: BigInt!
  debt: BigInt!
  isSelf: Boolean!
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}
