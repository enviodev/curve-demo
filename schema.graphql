type GlobalState {
  id: ID!
  chainId: Int!
  totalPools: Int!
  totalSwaps: BigInt!
  totalVolumeUsd: BigDecimal!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

enum PoolType {
  TRICRYPTO_NG
  TWOCRYPTO_NG
  CRYPTO_V1
  TRICRYPTO_LEGACY
  TWOCRYPTO_STANDALONE
  STABLESWAP_NG
  STABLESWAP_NG_META
  STABLESWAP
}

enum PriceSource {
  STABLECOIN
  DERIVED
}

enum PriceType {
  TOKEN_EXCHANGE
  LAST_PRICES
}

type Registry {
  id: ID!
  chainId: Int!
  address: String!
  registryType: String!
}

type Token {
  id: ID!
  chainId: Int!
  address: String!
  symbol: String!
  decimals: Int!
  isStablecoin: Boolean!
  usdPrice: BigDecimal
  priceSource: PriceSource
  lastPricedBlock: Int
  lastPricedTimestamp: BigInt
}

type Pool {
  id: ID!
  chainId: Int!
  address: String!
  lpTokenAddress: String!
  symbol: String!
  name: String!
  poolType: PoolType!
  registry: Registry
  nCoins: Int!
  coinAddresses: [String!]!
  coinSymbols: [String!]!
  coinDecimals: [Int!]!
  lastPrices: [BigInt!]!
  priceScales: [BigInt!]!
  # Stableswap fields — null for crypto pools
  a: BigInt
  virtualPrice: BigInt
  isMetaPool: Boolean
  basePool: String
  balances: [BigInt!]!
  totalSwapCount: BigInt!
  totalVolumeUsd: BigDecimal!
  tvlUsd: BigDecimal
  hasDonations: Boolean!
  isActive: Boolean!
  deploymentBlock: Int!
  deploymentTimestamp: BigInt!
  deploymentTxHash: String!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  liquidityEvents: [LiquidityEvent!]! @derivedFrom(field: "pool")
  poolPairs: [PoolPair!]! @derivedFrom(field: "pool")
  poolPrices: [PoolPrice!]! @derivedFrom(field: "pool")
  swaps: [Swap!]! @derivedFrom(field: "pool")
  snapshots: [PoolSnapshot!]! @derivedFrom(field: "pool")
}

# General per-swap record. Used by all pool classes (stableswap today; crypto
# pools also write the richer PoolPrice entity for oracle-based pricing).
type Swap {
  id: ID!
  chainId: Int!
  pool: Pool! @index
  buyer: String! @index
  soldId: Int!
  boughtId: Int!
  tokensSold: BigInt!
  tokensBought: BigInt!
  tokensSoldDecimal: BigDecimal!
  tokensBoughtDecimal: BigDecimal!
  volumeUsd: BigDecimal
  blockNumber: Int! @index
  timestamp: BigInt! @index
  txHash: String!
  logIndex: Int!
}

# Daily per-pool time-series, upserted on each swap/liquidity event.
# id = chainId_poolAddress_day (day = unix timestamp / 86400).
type PoolSnapshot {
  id: ID!
  chainId: Int!
  pool: Pool! @index
  day: Int! @index
  timestamp: BigInt!
  blockNumber: Int!
  tvlUsd: BigDecimal
  virtualPrice: BigInt
  balances: [BigInt!]!
  volumeUsd: BigDecimal!
  swapCount: Int!
}

type PoolPair {
  id: ID!
  pool: Pool! @index
  mainTokenIndex: Int!
  referenceTokenIndex: Int!
  mainToken: Token!
  referenceToken: Token!
}

type PoolPrice {
  id: ID!
  chainId: Int!
  pool: Pool! @index
  poolPair: PoolPair! @index
  priceType: PriceType!
  soldId: Int!
  boughtId: Int!
  tokensSold: BigDecimal!
  tokensBought: BigDecimal!
  price: BigDecimal!
  blockNumber: Int! @index
  timestamp: BigInt! @index
  txHash: String!
  logIndex: Int
  isRelevant: Boolean!
  buyer: String! @index
  fee: BigDecimal
  usdMainPrice: BigDecimal
  usdMainVolume: BigDecimal
  usdReferencePrice: BigDecimal
  usdReferenceVolume: BigDecimal
  usdFee: BigDecimal
}

enum LiquidityEventKind {
  ADD
  REMOVE
  REMOVE_ONE
  REMOVE_IMBALANCE
  DONATION
}

type LiquidityEvent {
  id: ID!
  pool: Pool! @index
  kind: LiquidityEventKind!
  provider: String! @index
  tokenAmounts: [BigInt!]!
  lpSupply: BigInt
  lpBurned: BigInt
  coinIndex: Int
  fee: BigInt
  timestamp: BigInt! @index
  blockNumber: Int!
  txHash: String!
}

# =========================================================================
# crvUSD mint markets + Curve Lend — shared Controller + LLAMMA design.
# A "Market" is one borrowable market; "Loan" is a single user's position
# (collateral, debt, soft-liquidation band range n1..n2). This is the
# per-user health/position data Curve's own public API does not expose.
# =========================================================================

enum MarketType {
  CRVUSD_MINT
  LEND
}

type Market {
  id: ID!
  chainId: Int!
  marketType: MarketType!
  controller: String! @index
  amm: String! @index
  vault: String @index
  collateralToken: Token!
  borrowedToken: Token!
  monetaryPolicy: String!
  priceOracle: String
  totalDebt: BigInt!
  totalCollateral: BigInt!
  totalDebtUsd: BigDecimal
  totalCollateralUsd: BigDecimal
  totalSupplied: BigInt!
  totalSuppliedUsd: BigDecimal
  nLoans: Int!
  rate: BigInt
  createdBlock: Int!
  createdTimestamp: BigInt!
  createdTxHash: String!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  loans: [Loan!]! @derivedFrom(field: "market")
  loanEvents: [LoanEvent!]! @derivedFrom(field: "market")
  liquidations: [Liquidation!]! @derivedFrom(field: "market")
  marketSnapshots: [MarketSnapshot!]! @derivedFrom(field: "market")
  vaultPositions: [VaultPosition!]! @derivedFrom(field: "market")
  ammSwaps: [AmmSwap!]! @derivedFrom(field: "market")
}

# Per-lender position in a Curve Lend ERC4626 vault (supply side).
type VaultPosition {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  shares: BigInt!
  isActive: Boolean!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

# crvUSD savings vault (scrvUSD) — ERC4626. Deposit crvUSD, earn borrower
# interest. Aggregate supply + per-depositor positions.
type SavingsVault {
  id: ID!
  chainId: Int!
  address: String!
  totalAssets: BigInt!
  totalShares: BigInt!
  depositorCount: Int!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  positions: [SavingsPosition!]! @derivedFrom(field: "vault")
}

type SavingsPosition {
  id: ID!
  chainId: Int!
  vault: SavingsVault! @index
  user: String! @index
  shares: BigInt!
  isActive: Boolean!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

# =========================================================================
# Gauges + GaugeController (CRV emissions). A Gauge stakes a pool's LP token
# and directs CRV emissions by its gauge weight; staked + working supply drive
# the CRV reward APR. GaugeVote records veCRV holders steering emissions.
# =========================================================================

type Gauge {
  id: ID!
  chainId: Int!
  address: String!
  gaugeType: Int!
  weight: BigInt!
  totalWeight: BigInt!
  totalStaked: BigInt!
  workingSupply: BigInt!
  isKilled: Boolean!
  createdBlock: Int!
  createdTimestamp: BigInt!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  votes: [GaugeVote!]! @derivedFrom(field: "gauge")
}

type GaugeVote {
  id: ID!
  chainId: Int!
  gauge: Gauge! @index
  user: String! @index
  weight: BigInt!
  votedAt: BigInt!
  timestamp: BigInt! @index
  blockNumber: Int!
  txHash: String!
}

# =========================================================================
# veCRV vote-escrow (locks) + fee distribution (protocol revenue to lockers).
# =========================================================================

type Lock {
  id: ID!
  chainId: Int!
  user: String! @index
  lockedAmount: BigInt!
  unlockTime: BigInt!
  isActive: Boolean!
  createdBlock: Int!
  createdTimestamp: BigInt!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

type VeCrvState {
  id: ID!
  chainId: Int!
  totalLocked: BigInt!
  lockCount: Int!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

type FeeDistribution {
  id: ID!
  chainId: Int!
  distributor: String! @index
  token: String!
  weekTime: BigInt!
  tokens: BigInt!
  blockNumber: Int!
  timestamp: BigInt! @index
}

type FeeClaim {
  id: ID!
  chainId: Int!
  distributor: String! @index
  recipient: String! @index
  amount: BigInt!
  epoch: BigInt!
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}

type Loan {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  collateral: BigInt!
  debt: BigInt!
  collateralUsd: BigDecimal
  debtUsd: BigDecimal
  n1: BigInt!
  n2: BigInt!
  liquidationDiscount: BigInt!
  isActive: Boolean!
  createdBlock: Int!
  createdTimestamp: BigInt!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}

enum LoanEventKind {
  BORROW
  REPAY
  REMOVE_COLLATERAL
  LIQUIDATE
}

type LoanEvent {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  kind: LoanEventKind!
  collateralChange: BigInt!
  debtChange: BigInt!
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}

type Liquidation {
  id: ID!
  chainId: Int!
  market: Market! @index
  user: String! @index
  liquidator: String! @index
  collateralReceived: BigInt!
  stablecoinReceived: BigInt!
  debt: BigInt!
  isSelf: Boolean!
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}

# Daily per-market time-series (debt / collateral / loan count / rate).
type MarketSnapshot {
  id: ID!
  chainId: Int!
  market: Market! @index
  day: Int! @index
  timestamp: BigInt!
  blockNumber: Int!
  totalDebt: BigInt!
  totalCollateral: BigInt!
  totalDebtUsd: BigDecimal
  nLoans: Int!
  rate: BigInt
}

# A trade through a market's LLAMMA AMM — i.e. collateral being soft-liquidated
# (or de-liquidated) as the oracle price moves through the position bands.
type AmmSwap {
  id: ID!
  chainId: Int!
  market: Market! @index
  buyer: String! @index
  soldId: Int!
  boughtId: Int!
  tokensSold: BigInt!
  tokensBought: BigInt!
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}

# =========================================================================
# crvUSD PegKeepers — the peg-defense reserves. A keeper provides crvUSD into
# its stable pool when crvUSD trades above $1 and withdraws when below; its
# `debt` (net provided) is a direct peg-pressure signal. Each action is stamped
# with the live crvUSD price from the PriceAggregator.
# =========================================================================

enum PegKeeperActionKind {
  PROVIDE
  WITHDRAW
  PROFIT
}

type PegKeeper {
  id: ID!
  chainId: Int!
  address: String!
  stablecoin: String!
  debt: BigInt!
  totalProvided: BigInt!
  totalWithdrawn: BigInt!
  totalProfit: BigInt!
  actionCount: Int!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
  actions: [PegKeeperAction!]! @derivedFrom(field: "pegKeeper")
}

type PegKeeperAction {
  id: ID!
  chainId: Int!
  pegKeeper: PegKeeper! @index
  kind: PegKeeperActionKind!
  amount: BigInt!
  pegPrice: BigDecimal
  blockNumber: Int!
  timestamp: BigInt! @index
  txHash: String!
}
